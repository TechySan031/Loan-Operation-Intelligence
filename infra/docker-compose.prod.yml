# Production Docker Compose
# Extends the base docker-compose.yml with production settings

version: "3.9"

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: always
    command: npm start

  postgres:
    restart: always

  redis:
    restart: always
